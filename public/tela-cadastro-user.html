<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Funcionário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../assets/style/style.css">
</head>

<body class="pagina_cadastro_user">
    <style>
        .navbar-nav .nav-link {
            color: #ffffff !important;
            font-weight: bold;
            font-size: 120%;
        }

        .navbar-nav .nav-link:hover {
            color: #c4cacf !important;
        }
    </style>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #2D3250; padding: 15px 80px;">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item mx-3">
                        <a class="nav-link" href="#">Dashboard</a>
                    </li>
                    <li class="nav-item mx-3">
                        <a class="nav-link" href="#">Sensores</a>
                    </li>
                    <li class="nav-item mx-3">
                        <a class="nav-link" href="#">Trens</a>
                    </li>
                    <li class="nav-item mx-3">
                        <a class="nav-link" href="#">Rotas</a>
                    </li>
                    <li class="nav-item mx-3">
                        <a class="nav-link" href="#">Funcionário</a>
                    </li>
                    <li class="nav-item mx-3">
                        <a class="nav-link" href="#">Relatórios</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            NomeAdmin
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Sair</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="d-flex align-items-center justify-content-center"
        style="min-height: 90vh; background-color: #c4cacf; padding: 20px;">

        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6">

                    <div class="card shadow-lg border-0" style="border-radius: 20px;">

                        <div class="card-body p-5">

                            <h2 class="card-title text-center fw-bold mb-2">Cadastrar novo funcionário</h2>
                            <p class="text-center text-muted mb-5">Preencha os dados abaixo para cadastrar um novo
                                funcionário.</p>

                            <form>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Nome</label>
                                        <input type="text" class="form-control" placeholder="Digite o nome completo">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Cargo</label>
                                        <select class="form-select">
                                            <option selected>Selecione o cargo</option>
                                            <option>Administrador</option>
                                            <option>Funcionário</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">CPF</label>
                                        <input type="text" class="form-control" placeholder="000.000.000-00">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Telefone</label>
                                        <input type="tel" class="form-control" placeholder="(00) 00000-0000">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Email</label>
                                    <input type="email" class="form-control" placeholder="digite o e-mail">
                                </div>

                                <div class="row mb-4">
                                    <div class="col-md-12">
                                        <label class="form-label fw-bold">Senha</label>
                                        <input type="password" class="form-control" placeholder="Crie uma senha forte">
                                    </div>
                                </div>

                                <div class="d-flex justify-content-center gap-3">
                                    <button type="button" class="btn btn-light border px-4"
                                        style="font-family: 'Trebuchet MS', sans-serif; border-color: #d9c03d;">Cancelar</button>
                                    <button type="submit" class="btn btn-primary px-4"
                                        style="background-color: #2D3250; font-family: 'Trebuchet MS', sans-serif;">Cadastrar</button>
                                </div>
                            </form>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
